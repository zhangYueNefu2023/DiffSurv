data:
  processed_dir: processed_data
  num_folds: 5

model:
  embed_dim: 512
  depth: 6
  num_heads: 8
  dropout: 0.0

diffusion:
  num_train_steps: 1000
  beta_start: 0.0001
  beta_end: 0.02

training:
  batch_size: 128
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.00001
  grad_clip: 1.0
  mse_weight: 1.0
  cox_weight: 0.5
  focal_gamma: 2.0
  use_focal_cox: true
  data_fraction: 1.0
  num_workers: 0
  seed: 42

evaluation:
  batch_size: 128
  ddim_steps: 25
  ddim_eta: 0.0
  num_workers: 0

outputs:
  checkpoint_dir: checkpoints
